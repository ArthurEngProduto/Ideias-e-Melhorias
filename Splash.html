<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splash - Portal de Ideias e Melhorias</title>
    <script>
      (function () {
        const THEME_KEY = 'portalTheme';
        const storedTheme = localStorage.getItem(THEME_KEY);
        const initialTheme = (storedTheme === 'dark') ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', initialTheme);
      })();
    </script>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1d2433;
        --splash-bg: var(--bg);
        --mask-top: -11px;
        --mask-left: 170px;
        --mask-width: 50%;
        --mask-height: 30%;
        --mask-reveal-time: 3300ms;
        --glow-time: 1500ms;
      }

      html[data-theme="dark"] {
        --bg: #0f172a;
        --text: #ffffff;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
      }

      .screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }

      #splash {
        background: var(--splash-bg);
        opacity: 1;
        visibility: visible;
        transition: opacity 520ms ease, visibility 520ms ease;
      }

      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      .logo-wrap {
        position: relative;
        width: min(340px, 43vw);
        aspect-ratio: 1068 / 475;
      }

      .logo-wrap img,
      .logo-wrap .fallback {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .logo-wrap img {
        display: none;
        object-fit: contain;
      }

      html[data-theme="dark"] .logo-wrap .logo-dark { display: block; }
      html[data-theme="light"] .logo-wrap .logo-light { display: block; }

      .logo-wrap .fallback {
        display: none;
        place-items: center;
        color: var(--text);
        font-size: clamp(38px, 8vw, 90px);
        font-style: italic;
        font-weight: 700;
      }

      .logo-wrap.glow img,
      .logo-wrap.glow .fallback {
        animation: logo-glow var(--glow-time) ease-out forwards;
      }

      html[data-theme="dark"] .logo-wrap.glow .logo-dark {
        --glow-peak-brightness: 1.15;
        --glow-peak-contrast: 1;
        --glow-peak-saturate: 1;
        --glow-shadow-alpha: 0.48;
        --glow-shadow-near: 4px;
        --glow-shadow-far: 7px;
        --glow-shadow-rgb: 245, 247, 230;
      }

      html[data-theme="light"] .logo-wrap.glow .logo-light {
        --glow-peak-brightness: 1.3;
        --glow-peak-contrast: 0.7;
        --glow-peak-saturate: 1;
        --glow-shadow-alpha: 0.16;
        --glow-shadow-near: 12px;
        --glow-shadow-far: 24px;
        --glow-shadow-rgb: 255, 255, 255;
      }

      @keyframes logo-glow {
        0% {
          filter: brightness(1) contrast(1) saturate(1) drop-shadow(0 0 0 rgba(var(--glow-shadow-rgb, 245, 247, 230), 0));
        }
        45% {
          filter: brightness(var(--glow-peak-brightness, 1.3))
                  contrast(var(--glow-peak-contrast, 1))
                  saturate(var(--glow-peak-saturate, 1))
                  drop-shadow(0 0 var(--glow-shadow-near, 14px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)))
                  drop-shadow(0 0 var(--glow-shadow-far, 32px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)));
        }
        100% {
          filter: brightness(1) contrast(1) saturate(1) drop-shadow(0 0 0 rgba(var(--glow-shadow-rgb, 245, 247, 230), 0));
        }
      }

      .logo-mask {
        position: absolute;
        top: var(--mask-top);
        left: var(--mask-left);
        width: var(--mask-width);
        height: var(--mask-height);
        background: var(--splash-bg);
        clip-path: inset(0 0 0 0);
        animation: reveal-left-to-right var(--mask-reveal-time) ease-out 160ms forwards;
        animation-play-state: paused;
      }

      .logo-mask.run {
        animation-play-state: running;
      }

      @keyframes reveal-left-to-right {
        0% { clip-path: inset(0 0 0 0); }
        100% { clip-path: inset(0 0 0 100%); }
      }
    </style>
  </head>
  <body>
    <section id="splash" class="screen" aria-label="Splash screen">
      <div id="logoWrap" class="logo-wrap" role="img" aria-label="Logo Baldi">
        <img id="logoDark" class="logo-dark" alt="Baldi branca" src="https://i.ibb.co/933KM0KH/Logo-Baldi-Vers-o-Correta-Branca.png" />
        <img id="logoLight" class="logo-light" alt="Baldi preta" src="https://i.ibb.co/PzDD4QLk/Logo-Baldi-Vers-o-Correta-Preta.png" />
        <div id="logoFallback" class="fallback">Baldi</div>
        <div id="logoMask" class="logo-mask" aria-hidden="true"></div>
      </div>
    </section>

    <script>
      (function () {
        const LOGO_TIMEOUT_MS = 3500;
        const GLOW_MS = 1500;
        const HOME_URL = '<?!= SPLASH_TO_HOME_URL ?>' || '?page=index&splash=1';
        const APP_BASE_URL = '<?!= APP_BASE_URL ?>' || '';
        const THEME_KEY = 'portalTheme';

        const splash = document.getElementById('splash');
        const logoDark = document.getElementById('logoDark');
        const logoLight = document.getElementById('logoLight');
        const logoWrap = document.getElementById('logoWrap');
        const logoMask = document.getElementById('logoMask');

        function getActiveTheme() {
          return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        }

        function getActiveLogo() {
          return getActiveTheme() === 'dark' ? logoDark : logoLight;
        }

        function navigateToHome(withSplashFlag) {
          const target = withSplashFlag ? HOME_URL : (APP_BASE_URL ? APP_BASE_URL + '?page=index' : '?page=index');
          window.location.replace(target);
        }

        function preloadPortalData() {
          if (!window.google || !google.script || !google.script.run) return;

          google.script.run
            .withSuccessHandler((bootstrapPayload) => {
              const cachedBootstrap = {
                ts: Date.now(),
                payload: bootstrapPayload || {}
              };
              sessionStorage.setItem('portalPreloadBootstrap', JSON.stringify(cachedBootstrap));

              google.script.run
                .withSuccessHandler((dataPayload) => {
                  const cachedData = {
                    ts: Date.now(),
                    payload: dataPayload || {}
                  };
                  sessionStorage.setItem('portalPreloadData', JSON.stringify(cachedData));
                })
                .withFailureHandler(() => {})
                .getPortalData({}, 1, 12);
            })
            .withFailureHandler(() => {})
            .getPortalBootstrap();
        }

        function runSplashSequence() {
          preloadPortalData();
          logoMask.classList.add('run');

          logoMask.addEventListener('animationend', () => {
            logoWrap.classList.add('glow');
            const glowTarget = getActiveLogo();

            glowTarget.addEventListener('animationend', () => {
              splash.classList.add('hide');
              navigateToHome(true);
            }, { once: true });

            setTimeout(() => {
              if (!splash.classList.contains('hide')) {
                splash.classList.add('hide');
                navigateToHome(true);
              }
            }, GLOW_MS + 220);
          }, { once: true });
        }

        function startWithLogoValidation() {
          const storedTheme = localStorage.getItem(THEME_KEY);
          const initialTheme = storedTheme === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', initialTheme);

          const activeLogo = getActiveLogo();
          let done = false;

          const fallbackToHome = () => {
            if (done) return;
            done = true;
            navigateToHome(false);
          };

          const proceedWithSplash = () => {
            if (done) return;
            done = true;
            runSplashSequence();
          };

          const timeoutId = setTimeout(fallbackToHome, LOGO_TIMEOUT_MS);

          activeLogo.addEventListener('load', () => {
            clearTimeout(timeoutId);
            proceedWithSplash();
          }, { once: true });

          activeLogo.addEventListener('error', () => {
            clearTimeout(timeoutId);
            fallbackToHome();
          }, { once: true });

          if (activeLogo.complete) {
            clearTimeout(timeoutId);
            if (activeLogo.naturalWidth > 0) {
              proceedWithSplash();
            } else {
              fallbackToHome();
            }
          }
        }

        startWithLogoValidation();
      })();
    </script>
  </body>
</html>
